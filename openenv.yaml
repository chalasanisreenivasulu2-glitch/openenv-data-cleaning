spec_version: 1
name: data-cleaning-env
type: environment
runtime: docker
app: server:app
port: 7860

metadata:
  description: >
    A real-world OpenEnv environment where an AI agent cleans dirty CSV datasets.
    The agent applies data cleaning operations to fix duplicates, missing values,
    inconsistent formats, outliers, and value normalization.
  tags:
    - openenv
    - data-cleaning
    - real-world
    - csv

tasks:
  - id: easy
    name: Remove Duplicates & Fill Nulls
    difficulty: easy
    max_steps: 10
    description: Remove duplicate rows and fill missing salary values.

  - id: medium
    name: Format Standardization
    difficulty: medium
    max_steps: 20
    description: Standardize date, phone, and gender formats.

  - id: hard
    name: Full Multi-Issue Cleaning
    difficulty: hard
    max_steps: 30
    description: Fix duplicates, missing values, outliers, and format inconsistencies.

action_space:
  type: object
  operations:
    - remove_duplicates
    - fill_missing
    - standardize_format
    - replace_value
    - drop_outliers
    - finish

observation_space:
  type: object
  fields:
    - columns
    - shape
    - missing_counts
    - duplicate_count
    - sample_rows
    - issues

reward_range: [0.0, 1.0]